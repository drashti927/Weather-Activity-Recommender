<!DOCTYPE html>
<html>
<head>
  <title>Weather Recommender</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="card">
  <h1>🌤 Weather & Activity Recommender</h1>

  <input id="userId" placeholder="User ID">

</div>

<script src="app.js"></script>
</body>
</html>
